<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latarah Ellis - Flask Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            margin: auto;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 5px;
        }

        h2 {
            font-weight: normal;
            color: #555;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 85%;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2563eb;
        }

        p {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome 👋</h1>
    <h2>Latarah Ellis</h2>

    <!-- Message from Flask -->
    <p>{{ message }}</p>

    <form method="POST">
        <input type="text" name="name" placeholder="Enter your name">
        <br>
        <button type="submit">Greet Me</button>
    </form>
</div>

</body>
</html>
